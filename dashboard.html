<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Fumicon</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body {
      background: #f5f7fb;
      font-family: Arial, sans-serif;
    }
    .topbar {
      background: #111;
      color: #fff;
      padding: 15px 24px;
      border-radius: 18px;
      margin: 10px;
    }
    .dashboard-card {
      background: #fff;
      border-radius: 22px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.06);
    }
    .stat-box {
      background: linear-gradient(135deg, #0f172a, #111827);
      color: #fff;
      border-radius: 18px;
      padding: 18px;
    }
  </style>
</head>
<body>
  <div class="container py-3">
    <div class="topbar d-flex justify-content-between align-items-center">
      <h4 class="mb-0">FUMICON</h4>
      <a href="index.html" class="btn btn-outline-light btn-sm">Logout</a>
    </div>

    <section class="row g-4 mt-1">
      <div class="col-md-3">
        <div class="stat-box">
          <p class="mb-1">Total Orders</p>
          <h3>124</h3>
        </div>
      </div>
      <div class="col-md-3">
        <div class="stat-box">
          <p class="mb-1">Pending</p>
          <h3>18</h3>
        </div>
      </div>
      <div class="col-md-3">
        <div class="stat-box">
          <p class="mb-1">Completed</p>
          <h3>96</h3>
        </div>
      </div>
      <div class="col-md-3">
        <div class="stat-box">
          <p class="mb-1">Revenue</p>
          <h3>₹2.4L</h3>
        </div>
      </div>
    </section>

    <section class="dashboard-card p-4 mt-4">
      <h4 class="fw-bold mb-3">Recent Bookings</h4>
      <div class="table-responsive">
        <table class="table align-middle">
          <thead>
            <tr>
              <th>Client</th>
              <th>Service</th>
              <th>Date</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>Ali Khan</td>
              <td>Home Fumigation</td>
              <td>18 Jun 2026</td>
              <td><span class="badge bg-success">Done</span></td>
            </tr>
            <tr>
              <td>Sarah Ahmed</td>
              <td>Office Sanitization</td>
              <td>19 Jun 2026</td>
              <td><span class="badge bg-warning text-dark">Pending</span></td>
            </tr>
            <tr>
              <td>Usman Raza</td>
              <td>Restaurant Service</td>
              <td>20 Jun 2026</td>
              <td><span class="badge bg-info text-dark">In Progress</span></td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </div>
</body>
</html>
