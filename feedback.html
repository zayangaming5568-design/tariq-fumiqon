<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feedback - Fumicon</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f5f7fb; font-family: Arial, sans-serif; }
    .navbar { background: #111 !important; }
    .nav-link, .navbar-brand { color: #fff !important; }
    .feedback-banner { background: #111827; color: #fff; }
    .feedback-banner h1 { font-size: 2.5rem; }
    .feedback-card { border-radius: 24px; box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08); }
    .form-control:focus { border-color: #111; box-shadow: none; }
    .btn-primary { background: #111; border: none; }
    .btn-primary:hover { background: #333; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg sticky-top py-3">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">FUMICON</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
          <li class="nav-item"><a class="nav-link" href="services.html">Services</a></li>
          <li class="nav-item"><a class="nav-link" href="packages.html">Packages</a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
          <li class="nav-item"><a class="nav-link active" href="feedback.html">Feedback</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <section class="feedback-banner py-5">
    <div class="container py-5 text-center">
      <h1 class="fw-bold">Give Us Your Feedback</h1>
      <p class="lead">Share your experience with Fumicon services so we can improve and serve you better.</p>
    </div>
  </section>

  <section class="py-5">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <div class="bg-white p-4 feedback-card">
            <h4 class="fw-bold mb-4">Feedback Form</h4>
            <form>
              <div class="mb-3">
                <label class="form-label">Name</label>
                <input type="text" class="form-control" placeholder="Your name">
              </div>
              <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" placeholder="name@example.com">
              </div>
              <div class="mb-3">
                <label class="form-label">Service Used</label>
                <select class="form-select">
                  <option selected disabled>Select a service</option>
                  <option>Home Fumigation</option>
                  <option>Office Protection</option>
                  <option>Restaurant Sanitization</option>
                  <option>Other</option>
                </select>
              </div>
              <div class="mb-3">
                <label class="form-label">Rating</label>
                <select class="form-select">
                  <option selected disabled>Choose rating</option>
                  <option>5 - Excellent</option>
                  <option>4 - Very Good</option>
                  <option>3 - Good</option>
                  <option>2 - Fair</option>
                  <option>1 - Poor</option>
                </select>
              </div>
              <div class="mb-3">
                <label class="form-label">Your Feedback</label>
                <textarea class="form-control" rows="5" placeholder="Tell us what went well and how we can improve."></textarea>
              </div>
              <button type="submit" class="btn btn-primary px-4 py-2">Submit Feedback</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </section>

  <footer class="bg-dark text-white py-4">
    <div class="container text-center">
      <p class="mb-0">© 2026 Fumicon</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
