<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Order Page</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <h2 class="mb-4">Place Your Order</h2>

    <form id="orderForm">

        <input type="text" class="form-control mb-2" id="name" placeholder="Full Name" required>

        <input type="tel" class="form-control mb-2" id="phone" placeholder="Phone Number" required>

        <textarea class="form-control mb-2" id="address" placeholder="Full Address" required></textarea>

        <input type="text" class="form-control mb-3" id="product" readonly>

        <select class="form-select mb-3" disabled>
            <option>Pakistan Only</option>
        </select>

        <button class="btn btn-success w-100">Place Order</button>

    </form>

</div>

<script>
// URL se product get karo
const params = new URLSearchParams(window.location.search);
document.getElementById("product").value = params.get("product");

// Submit
document.getElementById("orderForm").addEventListener("submit", function(e){
    e.preventDefault();

    let order = {
        name: name.value,
        phone: phone.value,
        address: address.value,
        product: product.value
    };

    console.log("ORDER:", order);

    alert("Order placed successfully! Developer notified.");

    // backend connect yahan hoga
});
</script>

</body>
</html>v
